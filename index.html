<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INCIscope — 전성분 분석기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #63b4ff;
    --primary-dark: #2d6fe0;
    --bg: #eff5fc;
    --card: #f8f8f8;
    --text: #1e2a38;
    --muted: #667380;
    --border: #dee6f0;
    --trend: #d9822b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Noto Sans KR", "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    font-size: 15px;
  }
  header {
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 55%, #1b4fc4 100%);
    color: #fff;
    padding: 28px 20px 32px;
    text-align: center;
  }
  header::before, header::after {
    content: '';
    position: absolute;
    z-index: 0;
    border-radius: 50%;
    filter: blur(40px);
    pointer-events: none;
  }
  header::before {
    width: 200px;
    height: 200px;
    top: -70px;
    left: -50px;
    background: #ffffff;
    opacity: 0.18;
  }
  header::after {
    width: 240px;
    height: 240px;
    bottom: -120px;
    right: -70px;
    background: #bfe0ff;
    opacity: 0.28;
  }
  header .logo {
    position: relative;
    z-index: 1;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: -0.5px;
  }
  header .tagline {
    position: relative;
    z-index: 1;
    margin-top: 8px;
    font-size: 15px;
    font-weight: 500;
    opacity: 0.92;
  }
  @media (max-width: 480px) {
    header .logo { font-size: 24px; }
    header .tagline { font-size: 13.5px; }
  }
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 20px;
  }
  @media (max-width: 720px) {
    main { grid-template-columns: minmax(0, 1fr); }
  }
  .card {
    min-width: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    box-shadow: 0 2px 10px rgba(45, 111, 224, 0.08);
  }
  .img-placeholder {
    width: 100%;
    height: 140px;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: #eef4fb;
    border: 1.5px dashed #bcd3ec;
    border-radius: 10px;
    color: #8fa5bd;
  }
  .img-placeholder .ph-icon { font-size: 28px; opacity: 0.8; }
  .img-placeholder .ph-label { font-size: 12px; font-weight: 500; }
  .card h2 {
    font-size: 19px;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--primary-dark);
  }
  label {
    display: block;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
    margin-top: 14px;
  }
  label:first-of-type { margin-top: 0; }
  textarea {
    width: 100%;
    min-height: 160px;
    resize: vertical;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    font-size: 14.5px;
    font-family: inherit;
    color: var(--text);
  }
  select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14.5px;
    font-family: inherit;
    color: var(--text);
    background: #fff;
  }
  textarea:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 180, 255, 0.25);
  }
  button.analyze {
    margin-top: 18px;
    width: 100%;
    padding: 13px;
    background: var(--primary-dark);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  button.analyze:hover { background: #1e56c2; }
  button.analyze:disabled { background: #a9c8e8; cursor: not-allowed; }

  .note {
    margin-top: 10px;
    font-size: 12.5px;
    color: var(--muted);
    background: #e6f0fc;
    border-radius: 8px;
    padding: 8px 10px;
  }

  .result-card {
    display: flex;
    flex-direction: column;
    min-height: 340px;
  }
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    gap: 8px;
  }
  .empty-state .icon { font-size: 32px; }

  .spinner {
    width: 30px;
    height: 30px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .bar-label {
    width: 92px;
    flex-shrink: 0;
    color: var(--text);
  }
  .bar-track {
    flex: 1;
    background: var(--border);
    border-radius: 20px;
    height: 10px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 20px;
  }
  .bar-pct {
    width: 34px;
    text-align: right;
    color: var(--muted);
    flex-shrink: 0;
  }

  .trend-section {
    margin-top: 18px;
  }
  .trend-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .trend-badge {
    background: #fdf1e4;
    color: var(--trend);
    border: 1px solid #f2d9b8;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 14px;
    font-size: 13.5px;
  }
  th, td {
    text-align: left;
    padding: 7px 8px;
    border-bottom: 1px solid var(--border);
  }
  th { color: var(--muted); font-weight: 600; }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    background: #e5f1ff;
    color: var(--primary-dark);
  }
  .tag.unknown {
    background: #eef0f2;
    color: var(--muted);
  }
  .db-link {
    color: var(--primary-dark);
    font-size: 12.5px;
    font-weight: 600;
    text-decoration: none;
    white-space: nowrap;
  }
  .db-link:hover { text-decoration: underline; }

  .insight-list {
    margin-top: 16px;
    padding-left: 18px;
    font-size: 14px;
  }
  .insight-list li { margin-bottom: 6px; }

  footer {
    text-align: center;
    font-size: 12.5px;
    color: var(--muted);
    padding: 20px;
  }
</style>
</head>

<header>
  <div class="logo">🧪 INCIscope</div>
  <div class="tagline">전성분을 붙여넣으면, 공개된 성분 기능 분류로 구성과 트렌드를 분석해드립니다</div>
</header>

<main>

    <button class="analyze" id="analyzeBtn">분석하기</button>
    <div class="note">※ 분석은 공개된 INCI 기능 분류체계만 사용하며, 자사 원료 정보와는 매칭하지 않습니다.</div>
  </section>

  <section class="card result-card" id="resultCard">
    <h2>📊 분석 결과</h2>

      <div>전성분표를 입력하고<br>‘분석하기’를 눌러보세요</div>
    </div>
  </section>
</main>

  // 쉼표로 성분을 분리 — 괄호 안(예: "레티놀(1,000IU/g)")과 "1,2-헥산다이올"처럼
  // 숫자 사이에 낀 쉼표는 성분 구분자가 아니므로 분리 기준에서 제외
  function splitIngredientText(text) {
    const PLACEHOLDER = '';
    const protectedText = text.replace(/(\d),(\d)/g, '$1' + PLACEHOLDER + '$2');

    const items = [];
    let depth = 0, current = '';
    for (const ch of protectedText) {
      if (ch === '(') depth++;
      if (ch === ')') depth = Math.max(0, depth - 1);
      if (ch === ',' && depth === 0) {
        items.push(current.trim());
        current = '';
      } else {
        current += ch;
      }
    }
    if (current.trim()) items.push(current.trim());

    return items
      .map(s => s.split(PLACEHOLDER).join(','))
      .filter(Boolean);
  }

  // "성분명(부가정보)" 형태에서 검색/DB조회에 쓸 순수 성분명과 부가정보를 분리
  function parseIngredientItem(raw) {
    const m = raw.match(/^(.*?)\s*\(([^)]*)\)\s*$/);
    const name = (m ? m[1] : raw).trim();
    const note = m ? m[2].trim() : null;
    return { raw, name, note };
  }

  // 실제 입력된 전성분 텍스트를 파싱해 DB와 매칭 (DB에 없으면 '미분류')
  function analyzeInciText(text) {
    return splitIngredientText(text).map(raw => {
      const { name, note } = parseIngredientItem(raw);
      const dbEntry = INGREDIENT_DB[name];
      return {
        name,
        note,
        func: dbEntry ? dbEntry.func : '미분류',
        trend: dbEntry ? dbEntry.trend : false,
        known: !!dbEntry,
      };
    });
  }

  // 대한화장품협회(KCIA) 성분사전 검색 딥링크 — 괄호 속 부가설명은 제거하고 검색
  const kciaSearchUrl = (name) => {
    return 'https://kcia.or.kr/cid/search/ingd_list.php?skind=INGD_NM&sword=' + encodeURIComponent(name);
  };

    const rawText = inciInput.value.trim();
    if (!rawText) {
      emptyState.innerHTML = '<div class="icon">⚠️</div><div>분석할 전성분을 먼저 입력해주세요</div>';
      resultCard.innerHTML = '<h2>📊 분석 결과</h2>';
      resultCard.appendChild(emptyState);
      return;
    }

    analyzeBtn.disabled = true;
    analyzeBtn.textContent = '분석 중...';

    emptyState.innerHTML = '<div class="spinner"></div><div>입력하신 전성분을 분류 및 트렌드 분석 중...</div>';

    setTimeout(() => {
      const ingredients = analyzeInciText(rawText);
      const total = ingredients.length;
      const counts = {};
      ingredients.forEach(i => { counts[i.func] = (counts[i.func] || 0) + 1; });
      const maxCount = Math.max(...Object.values(counts));
      const unknownCount = ingredients.filter(i => !i.known).length;

      const barsHTML = Object.entries(counts).map(([func, count]) => {
        const widthPct = Math.round((count / maxCount) * 100);
        return `
          <div class="bar-row">
            <div class="bar-label">${func}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${widthPct}%"></div></div>
            <div class="bar-pct">${count}개</div>
          </div>`;
      }).join('');

      const trendItems = ingredients.filter(i => i.trend);
      const trendHTML = trendItems.length
        ? trendItems.map(i => `<span class="trend-badge">✨ ${i.name}</span>`).join('')
        : '<span class="bar-label">트렌드 성분 없음</span>';

      const topFunc = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];

      resultCard.innerHTML = `
        <h2>📊 분석 결과 <span style="font-size:12.5px; font-weight:500; color:var(--muted);">(총 ${total}개 성분)</span></h2>
        <div>${barsHTML}</div>

        <div class="trend-section">
          <label style="margin-top:0;">트렌드 활성성분</label>
          <div class="trend-badges">${trendHTML}</div>
        </div>

        <table>
          <tr><th>성분</th><th>기능 분류</th><th>공식 DB</th></tr>
          ${ingredients.map(i => `
            <tr>
              <td>${i.name}${i.note ? ` <span style="color:var(--muted); font-size:11.5px;">(${i.note})</span>` : ''}</td>
              <td><span class="tag${i.known ? '' : ' unknown'}">${i.func}</span></td>
              <td><a href="${kciaSearchUrl(i.name)}" target="_blank" rel="noopener" class="db-link">확인 ↗</a></td>
            </tr>
          `).join('')}
        </table>
        <div class="note" style="margin-top:8px;">※ '확인' 링크는 대한화장품협회 성분사전(kcia.or.kr) 검색 결과를 새 탭에서 엽니다. '미분류'는 현재 프로토타입 DB에 등록되지 않은 성분입니다.</div>

        <ul class="insight-list">
          <li>총 ${total}개 성분 중 ${topFunc[0]}가 ${topFunc[1]}개로 가장 큰 비중을 차지합니다.</li>
          <li>트렌드 성분이 ${trendItems.length}개 포함되어 있습니다${trendItems.length ? ' (' + trendItems.map(i => i.name).join(', ') + ')' : ''}.</li>
          <li>방부 성분 개수: ${counts['방부'] || 0}개 — 일반적인 방부 시스템 범위입니다.</li>
          ${unknownCount ? `<li>DB에 없어 미분류로 표시된 성분이 ${unknownCount}개 있습니다 — '확인' 링크로 공식 DB에서 직접 조회해보세요.</li>` : ''}
        </ul>
      `;

      analyzeBtn.disabled = false;
      analyzeBtn.textContent = '분석하기';
    }, 1200);
  });
